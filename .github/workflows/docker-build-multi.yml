name: Build Docker Image (Multi-Platform)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to use (e.g., v1.0.0)'
        required: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    strategy:
      matrix:
        platform:
          - linux/amd64
          - linux/arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/pkos
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push (amd64)
        if: matrix.platform == 'linux/amd64'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/pkos:${{ steps.meta.outputs.version }}-linux-amd64
            ${{ secrets.DOCKER_USERNAME }}/pkos:latest-linux-amd64
            ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=amd64
          cache-to: type=gha,scope=amd64,mode=max

      - name: Build and push (arm64)
        if: matrix.platform == 'linux/arm64'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/pkos:${{ steps.meta.outputs.version }}-linux-arm64
            ${{ secrets.DOCKER_USERNAME }}/pkos:latest-linux-arm64
            ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=arm64
          cache-to: type=gha,scope=arm64,mode=max

  create-manifest:
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      packages: write
    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create and push manifest
        run: |
          # 获取版本号
          VERSION="${{ github.ref_name }}"
          VERSION=${VERSION#refs/tags/v}

          # 拉取各架构镜像
          docker pull ${{ secrets.DOCKER_USERNAME }}/pkos:${VERSION}-linux-amd64
          docker pull ${{ secrets.DOCKER_USERNAME }}/pkos:${VERSION}-linux-arm64

          # 重新打标签
          docker tag ${{ secrets.DOCKER_USERNAME }}/pkos:${VERSION}-linux-amd64 ${{ secrets.DOCKER_USERNAME }}/pkos:${VERSION}-amd64
          docker tag ${{ secrets.DOCKER_USERNAME }}/pkos:${VERSION}-linux-arm64 ${{ secrets.DOCKER_USERNAME }}/pkos:${VERSION}-arm64
          docker tag ${{ secrets.DOCKER_USERNAME }}/pkos:latest-linux-amd64 ${{ secrets.DOCKER_USERNAME }}/pkos:amd64
          docker tag ${{ secrets.DOCKER_USERNAME }}/pkos:latest-linux-arm64 ${{ secrets.DOCKER_USERNAME }}/pkos:arm64

          # 推送新的标签
          docker push ${{ secrets.DOCKER_USERNAME }}/pkos:${VERSION}-amd64
          docker push ${{ secrets.DOCKER_USERNAME }}/pkos:${VERSION}-arm64
          docker push ${{ secrets.DOCKER_USERNAME }}/pkos:amd64
          docker push ${{ secrets.DOCKER_USERNAME }}/pkos:arm64

          # 创建 manifest for versioned tag
          docker buildx imagetools create \
            --tag ${{ secrets.DOCKER_USERNAME }}/pkos:${VERSION} \
            ${{ secrets.DOCKER_USERNAME }}/pkos:${VERSION}-amd64 \
            ${{ secrets.DOCKER_USERNAME }}/pkos:${VERSION}-arm64

          # 创建 manifest for latest tag
          docker buildx imagetools create \
            --tag ${{ secrets.DOCKER_USERNAME }}/pkos:latest \
            ${{ secrets.DOCKER_USERNAME }}/pkos:amd64 \
            ${{ secrets.DOCKER_USERNAME }}/pkos:arm64

  create-release:
    runs-on: ubuntu-latest
    needs: create-manifest
    permissions:
      contents: write
    steps:
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
