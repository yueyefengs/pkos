# 生产环境配置 - 使用预构建的 Docker 镜像
# 使用方法:
# 1. 设置 IMAGE_NAME 环境变量，如: export IMAGE_NAME=yourusername/pkos:latest
# 2. 或创建 .env 文件包含: IMAGE_NAME=yourusername/pkos:latest
# 3. 运行: docker-compose -f docker/docker-compose.yml up -d

name: pkos
services:
  pkos:
    image: ${IMAGE_NAME:-yueyefeng11/pkos:latest}
    container_name: pkos
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      - db
      - redis
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
      - CHROME_BIN=/usr/bin/chromium
      - CHROME_DRIVER=/usr/bin/chromedriver
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # 代理配置：Docker容器内访问宿主机代理
      # macOS/Windows: 使用 host.docker.internal
      # Linux: 使用宿主机IP或 --add-host=host.docker.internal:host-gateway
      - HTTP_PROXY=http://host.docker.internal:7897
      - HTTPS_PROXY=http://host.docker.internal:7897
    volumes:
      - ./log:/app/log

  db:
    image: postgres:15-alpine
    container_name: pkos-db
    environment:
      - POSTGRES_USER=pkos
      - POSTGRES_PASSWORD=pkos123
      - POSTGRES_DB=pkos_knowledge
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: pkos-redis
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
