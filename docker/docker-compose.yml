version: '3.8'

# 生产环境配置 - 使用预构建的 Docker 镜像
# 使用方法:
# 1. 设置 IMAGE_NAME 环境变量，如: export IMAGE_NAME=yourusername/pkos:latest
# 2. 或创建 .env 文件包含: IMAGE_NAME=yourusername/pkos:latest
# 3. 运行: docker-compose -f docker/docker-compose.yml up -d

services:
  bot:
    image: ${IMAGE_NAME:-ghcr.io/yueyefeng11/pkos:latest}
    container_name: pkos
    ports:
      - "8080:8080"
    env_file:
      - ../.env
    volumes:
      - ../config:/app/config:ro
      - ../temp:/app/temp
      - ../logs:/app/logs
    depends_on:
      - db
      - redis
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
      - CHROME_BIN=/usr/bin/chromium
      - CHROME_DRIVER=/usr/bin/chromedriver
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379

  db:
    image: postgres:15-alpine
    container_name: pkos-db
    environment:
      - POSTGRES_USER=feishu
      - POSTGRES_PASSWORD=feishu123
      - POSTGRES_DB=feishu_knowledge
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: pkos-redis
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
