version: '3.8'

# 开发环境配置 - 使用本地代码挂载，支持热重载
# 使用方法:
# 1. 在项目根目录运行: docker-compose -f docker/docker-compose.dev.yml up --build
# 2. 修改本地代码会自动重新加载 (FastAPI --reload)
# 3. 数据和日志持久化到本地目录

services:
  bot:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: uvicorn bot.main:app --host 0.0.0.0 --port 8080 --reload
    volumes:
      - ..:/app
      - /app/__pycache__
      - /app/.pytest_cache
    environment:
      - PYTHONUNBUFFERED=1
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    env_file:
      - ../.env
    ports:
      - "8080:8080"
    depends_on:
      - db
      - redis
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=feishu
      - POSTGRES_PASSWORD=feishu123
      - POSTGRES_DB=feishu_knowledge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
