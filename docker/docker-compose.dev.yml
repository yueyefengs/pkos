# 开发环境配置 - 使用本地代码挂载，支持热重载
# 使用方法:
# 1. 在项目根目录运行: docker-compose -f docker/docker-compose.dev.yml up --build
# 2. 修改本地代码会自动重新加载 (FastAPI --reload)
# 3. 数据和日志持久化到本地目录

name: pkos
services:
  pkos-mcp:
    container_name: pkos-mcp
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: python3 mcp_server.py http
    volumes:
      - ..:/app
      - /app/__pycache__
    environment:
      - PYTHONUNBUFFERED=1
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    env_file:
      - ../.env
    ports:
      - "9000:9000"
    depends_on:
      - db
      - redis
    restart: unless-stopped

  db:
    container_name: pkos-db
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=pkos
      - POSTGRES_PASSWORD=pkos123
      - POSTGRES_DB=pkos_knowledge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    container_name: pkos-redis
    image: redis:7-alpine
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
