<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 文档总结工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 20px;
        }

        .panel {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .panel-title {
            font-size: 1.2em;
            font-weight: 600;
            margin-bottom: 15px;
            color: #333;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-size: 0.9em;
            font-weight: 500;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
            font-family: inherit;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 12px;
        }

        .config-list {
            margin-bottom: 15px;
        }

        .config-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 6px;
            margin-bottom: 8px;
        }

        .config-item.active {
            border: 2px solid #667eea;
        }

        .config-item-info {
            flex: 1;
        }

        .config-item-name {
            font-weight: 500;
            color: #333;
        }

        .config-item-model {
            font-size: 12px;
            color: #666;
        }

        .config-actions {
            display: flex;
            gap: 5px;
        }

        .file-list {
            max-height: 200px;
            overflow-y: auto;
        }

        .file-item {
            padding: 10px;
            background: #f8f9fa;
            border-radius: 6px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .file-item:hover {
            background: #e9ecef;
        }

        .file-item.active {
            background: #e7f3ff;
            border: 1px solid #667eea;
        }

        .file-name {
            font-weight: 500;
            color: #333;
        }

        .file-size {
            font-size: 12px;
            color: #666;
        }

        .content-area {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .content-box {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            min-height: 300px;
            max-height: 500px;
            overflow-y: auto;
        }

        .content-box h3 {
            font-size: 1em;
            color: #666;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid #ddd;
        }

        .content-box pre {
            white-space: pre-wrap;
            word-wrap: break-word;
            font-family: inherit;
            line-height: 1.6;
            color: #333;
        }

        .summary-box {
            background: linear-gradient(135deg, #f5f7fa 0%, #e8ecf3 100%);
        }

        .summary-box pre {
            color: #2c3e50;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .status-message {
            padding: 10px 15px;
            border-radius: 6px;
            margin-bottom: 15px;
            display: none;
        }

        .status-message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status-message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .status-message.active {
            display: block;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            border-bottom: 1px solid #ddd;
        }

        .tab {
            padding: 10px 15px;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.3s;
        }

        .tab:hover {
            color: #667eea;
        }

        .tab.active {
            border-bottom-color: #667eea;
            color: #667eea;
            font-weight: 500;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .provider-select {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }

        .provider-option {
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .provider-option:hover {
            border-color: #667eea;
        }

        .provider-option.selected {
            border-color: #667eea;
            background: #f0f4ff;
        }

        .provider-option-icon {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .provider-option-name {
            font-weight: 500;
        }

        @media (max-width: 1024px) {
            .main-grid {
                grid-template-columns: 1fr;
            }

            .content-area {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>AI 文档总结工具</h1>
            <p>支持 OpenAI、Claude、DeepSeek、GLM 等多种大模型</p>
        </div>

        <div class="main-grid">
            <!-- 左侧配置面板 -->
            <div class="panel">
                <div class="tabs">
                    <div class="tab active" data-tab="llm">LLM 配置</div>
                    <div class="tab" data-tab="files">文件选择</div>
                    <div class="tab" data-tab="prompt">总结设置</div>
                </div>

                <!-- LLM 配置 -->
                <div class="tab-content active" id="tab-llm">
                    <div id="config-list" class="config-list"></div>

                    <button class="btn btn-secondary btn-small" onclick="showAddConfig()">+ 添加配置</button>

                    <div id="add-config-form" style="display: none; margin-top: 15px;">
                        <div class="form-group">
                            <label>选择提供商</label>
                            <div class="provider-select">
                                <div class="provider-option" data-provider="openai" onclick="selectProvider('openai')">
                                    <div class="provider-option-icon">🤖</div>
                                    <div class="provider-option-name">OpenAI</div>
                                </div>
                                <div class="provider-option" data-provider="claude" onclick="selectProvider('claude')">
                                    <div class="provider-option-icon">🧠</div>
                                    <div class="provider-option-name">Claude</div>
                                </div>
                                <div class="provider-option" data-provider="deepseek" onclick="selectProvider('deepseek')">
                                    <div class="provider-option-icon">🔍</div>
                                    <div class="provider-option-name">DeepSeek</div>
                                </div>
                                <div class="provider-option" data-provider="glm" onclick="selectProvider('glm')">
                                    <div class="provider-option-icon">🌟</div>
                                    <div class="provider-option-name">智谱 GLM</div>
                                </div>
                                <div class="provider-option" data-provider="oneapi" onclick="selectProvider('oneapi')">
                                    <div class="provider-option-icon">🔗</div>
                                    <div class="provider-option-name">OneAPI</div>
                                </div>
                            </div>
                        </div>

                        <div class="form-group">
                            <label>配置名称</label>
                            <input type="text" id="config-name" placeholder="例如: 我的 OpenAI">
                        </div>

                        <div class="form-group">
                            <label>API Key</label>
                            <input type="password" id="config-apikey" placeholder="sk-...">
                        </div>

                        <div class="form-group">
                            <label>Base URL (可选)</label>
                            <input type="text" id="config-baseurl" placeholder="自动填充">
                        </div>

                        <div class="form-group">
                            <label>模型</label>
                            <input type="text" id="config-model" placeholder="自动填充">
                        </div>

                        <div class="form-group">
                            <label>Temperature (0-1)</label>
                            <input type="number" id="config-temp" value="0.7" min="0" max="1" step="0.1">
                        </div>

                        <div style="display: flex; gap: 10px;">
                            <button class="btn btn-primary" onclick="saveConfig()">保存</button>
                            <button class="btn btn-secondary" onclick="hideAddConfig()">取消</button>
                        </div>
                    </div>
                </div>

                <!-- 文件选择 -->
                <div class="tab-content" id="tab-files">
                    <div id="file-list" class="file-list">
                        <div style="text-align: center; color: #999; padding: 20px;">加载中...</div>
                    </div>
                    <button class="btn btn-secondary btn-small" onclick="loadFiles()" style="margin-top: 10px;">刷新列表</button>
                </div>

                <!-- 总结设置 -->
                <div class="tab-content" id="tab-prompt">
                    <div class="form-group">
                        <label>总结 Prompt 模板</label>
                        <textarea id="summary-prompt" rows="10" placeholder="使用 {text} 作为文档内容的占位符"></textarea>
                    </div>
                    <button class="btn btn-primary" onclick="savePrompt()">保存 Prompt</button>

                    <div style="margin-top: 15px;">
                        <label style="font-size: 0.9em; color: #555; font-weight: 500;">预设模板</label>
                        <div style="margin-top: 8px;">
                            <button class="btn btn-secondary btn-small" onclick="setPreset('summary')">摘要总结</button>
                            <button class="btn btn-secondary btn-small" onclick="setPreset('keypoints')">要点提取</button>
                            <button class="btn btn-secondary btn-small" onclick="setPreset('markdown')">Markdown 笔记</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 右侧内容区域 -->
            <div class="panel">
                <div class="status-message" id="status-message"></div>

                <div class="content-area">
                    <div class="content-box">
                        <h3>原文内容</h3>
                        <pre id="original-content">请从左侧选择一个文件...</pre>
                    </div>

                    <div class="content-box summary-box">
                        <h3>总结结果</h3>
                        <div class="loading" id="loading">
                            <div class="spinner"></div>
                            <div>AI 正在总结中...</div>
                        </div>
                        <pre id="summary-content">等待生成总结...</pre>
                    </div>
                </div>

                <div style="display: flex; gap: 10px;">
                    <button class="btn btn-primary" id="summarize-btn" onclick="summarize()" disabled>开始总结</button>
                    <button class="btn btn-secondary" onclick="copySummary()">复制总结</button>
                    <button class="btn btn-secondary" onclick="downloadSummary()">下载总结</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8001/api';
        let configs = [];
        let currentConfig = null;
        let currentFile = null;
        let selectedProvider = null;

        // 预设 Prompt
        const PRESET_PROMPTS = {
            summary: `请对以下内容进行总结，提取关键信息和要点：

{text}`,
            keypoints: `请从以下内容中提取关键要点，以列表形式呈现：

{text}`,
            markdown: `请将以下内容整理成 Markdown 格式的学习笔记，包含：
1. 主要内容概述
2. 关键要点列表
3. 重要概念解释

原文：
{text}`
        };

        // 初始化
        async function init() {
            await loadConfig();
            await loadFiles();
            setupTabs();
        }

        // 标签页切换
        function setupTabs() {
            document.querySelectorAll('.tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                    tab.classList.add('active');
                    document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
                });
            });
        }

        // 加载配置
        async function loadConfig() {
            try {
                const res = await fetch(`${API_BASE}/config`);
                const data = await res.json();
                configs = data.configs || [];
                document.getElementById('summary-prompt').value = data.defaultPrompt || PRESET_PROMPTS.summary;
                renderConfigs();
            } catch (error) {
                showError('加载配置失败: ' + error.message);
            }
        }

        // 渲染配置列表
        function renderConfigs() {
            const list = document.getElementById('config-list');
            if (configs.length === 0) {
                list.innerHTML = '<div style="text-align: center; color: #999; padding: 20px;">暂无配置，请添加</div>';
                return;
            }

            list.innerHTML = configs.map((config, index) => `
                <div class="config-item ${currentConfig === index ? 'active' : ''}" onclick="selectConfig(${index})">
                    <div class="config-item-info">
                        <div class="config-item-name">${escapeHtml(config.name)}</div>
                        <div class="config-item-model">${config.provider} - ${config.model}</div>
                    </div>
                    <div class="config-actions">
                        <button class="btn btn-secondary btn-small" onclick="event.stopPropagation(); testConfig(${index})">测试</button>
                        <button class="btn btn-secondary btn-small" onclick="event.stopPropagation(); deleteConfig(${index})">删除</button>
                    </div>
                </div>
            `).join('');
        }

        // 选择配置
        function selectConfig(index) {
            currentConfig = index;
            renderConfigs();
            updateSummarizeButton();
        }

        // 显示添加配置表单
        function showAddConfig() {
            document.getElementById('add-config-form').style.display = 'block';
        }

        // 隐藏添加配置表单
        function hideAddConfig() {
            document.getElementById('add-config-form').style.display = 'none';
            selectedProvider = null;
            document.querySelectorAll('.provider-option').forEach(el => el.classList.remove('selected'));
        }

        // 选择提供商
        async function selectProvider(provider) {
            selectedProvider = provider;
            document.querySelectorAll('.provider-option').forEach(el => el.classList.remove('selected'));
            document.querySelector(`[data-provider="${provider}"]`).classList.add('selected');

            // 加载预设配置
            try {
                const res = await fetch(`${API_BASE}/config`);
                const data = await res.json();
                const preset = data.presets[provider];
                if (preset) {
                    document.getElementById('config-baseurl').value = preset.base_url || '';
                    document.getElementById('config-model').value = preset.model || '';
                }
            } catch (error) {
                console.error('加载预设配置失败:', error);
            }
        }

        // 保存配置
        async function saveConfig() {
            const name = document.getElementById('config-name').value.trim();
            const apiKey = document.getElementById('config-apikey').value.trim();
            const baseUrl = document.getElementById('config-baseurl').value.trim();
            const model = document.getElementById('config-model').value.trim();
            const temperature = parseFloat(document.getElementById('config-temp').value);

            if (!name || !apiKey || !model || !selectedProvider) {
                showError('请填写所有必填字段');
                return;
            }

            const newConfig = {
                name,
                api_key: apiKey,
                base_url: baseUrl || null,
                model,
                temperature,
                provider: selectedProvider
            };

            configs.push(newConfig);

            try {
                await fetch(`${API_BASE}/config`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ configs, defaultPrompt: document.getElementById('summary-prompt').value })
                });
                hideAddConfig();
                renderConfigs();
                showSuccess('配置保存成功');
                clearAddForm();
            } catch (error) {
                showError('保存失败: ' + error.message);
            }
        }

        // 清空添加表单
        function clearAddForm() {
            document.getElementById('config-name').value = '';
            document.getElementById('config-apikey').value = '';
            document.getElementById('config-baseurl').value = '';
            document.getElementById('config-model').value = '';
            document.getElementById('config-temp').value = '0.7';
        }

        // 删除配置
        async function deleteConfig(index) {
            if (!confirm('确定要删除这个配置吗？')) return;

            configs.splice(index, 1);
            if (currentConfig === index) currentConfig = null;

            try {
                await fetch(`${API_BASE}/config`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ configs, defaultPrompt: document.getElementById('summary-prompt').value })
                });
                renderConfigs();
                showSuccess('配置已删除');
            } catch (error) {
                showError('删除失败: ' + error.message);
            }
        }

        // 测试配置
        async function testConfig(index) {
            const config = configs[index];
            try {
                showStatus('正在测试连接...', 'info');
                const res = await fetch(`${API_BASE}/test`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(config)
                });
                const data = await res.json();
                if (data.success) {
                    showSuccess('连接成功！响应: ' + data.response);
                } else {
                    showError('连接失败');
                }
            } catch (error) {
                showError('测试失败: ' + error.message);
            }
        }

        // 加载文件列表
        async function loadFiles() {
            try {
                const res = await fetch(`${API_BASE}/files?directory=/Users/yureqingli/code/PKOS/outputs`);
                const data = await res.json();
                renderFiles(data.files);
            } catch (error) {
                document.getElementById('file-list').innerHTML = '<div style="text-align: center; color: #999; padding: 20px;">加载失败</div>';
            }
        }

        // 渲染文件列表
        function renderFiles(files) {
            const list = document.getElementById('file-list');
            if (files.length === 0) {
                list.innerHTML = '<div style="text-align: center; color: #999; padding: 20px;">暂无文件</div>';
                return;
            }

            list.innerHTML = files.map(file => `
                <div class="file-item" data-filename="${escapeHtml(file.name)}" onclick="selectFile('${escapeHtml(file.name)}', this)">
                    <div class="file-name">${escapeHtml(file.name)}</div>
                    <div class="file-size">${file.size} 字符</div>
                </div>
            `).join('');
        }

        // 选择文件
        async function selectFile(filename, element) {
            try {
                const res = await fetch(`${API_BASE}/file/${encodeURIComponent(filename)}?directory=/Users/yureqingli/code/PKOS/outputs`);
                const data = await res.json();
                currentFile = data;
                document.getElementById('original-content').textContent = data.content;

                document.querySelectorAll('.file-item').forEach(el => el.classList.remove('active'));
                if (element) {
                    element.classList.add('active');
                }

                updateSummarizeButton();
            } catch (error) {
                showError('加载文件失败: ' + error.message);
            }
        }

        // 更新总结按钮状态
        function updateSummarizeButton() {
            const btn = document.getElementById('summarize-btn');
            btn.disabled = !(currentConfig !== null && currentFile);
        }

        // 保存 Prompt
        async function savePrompt() {
            try {
                await fetch(`${API_BASE}/config`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ configs, defaultPrompt: document.getElementById('summary-prompt').value })
                });
                showSuccess('Prompt 已保存');
            } catch (error) {
                showError('保存失败: ' + error.message);
            }
        }

        // 设置预设 Prompt
        function setPreset(type) {
            document.getElementById('summary-prompt').value = PRESET_PROMPTS[type];
        }

        // 开始总结
        async function summarize() {
            if (currentConfig === null || !currentFile) {
                showError('请先选择配置和文件');
                return;
            }

            const config = configs[currentConfig];
            const prompt = document.getElementById('summary-prompt').value;

            document.getElementById('loading').classList.add('active');
            document.getElementById('summary-content').style.display = 'none';
            document.getElementById('summarize-btn').disabled = true;

            try {
                const res = await fetch(`${API_BASE}/summarize`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        text: currentFile.content,
                        prompt: prompt,
                        config: config
                    })
                });

                const data = await res.json();

                if (data.success) {
                    document.getElementById('summary-content').textContent = data.summary;
                    showSuccess('总结完成！');
                } else {
                    showError('总结失败');
                }
            } catch (error) {
                showError('总结失败: ' + error.message);
            } finally {
                document.getElementById('loading').classList.remove('active');
                document.getElementById('summary-content').style.display = 'block';
                document.getElementById('summarize-btn').disabled = false;
            }
        }

        // 复制总结
        function copySummary() {
            const content = document.getElementById('summary-content').textContent;
            if (!content || content === '等待生成总结...') {
                showError('没有可复制的内容');
                return;
            }

            navigator.clipboard.writeText(content).then(() => {
                showSuccess('已复制到剪贴板');
            }).catch(() => {
                showError('复制失败');
            });
        }

        // 下载总结
        function downloadSummary() {
            const content = document.getElementById('summary-content').textContent;
            if (!content || content === '等待生成总结...') {
                showError('没有可下载的内容');
                return;
            }

            const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = (currentFile?.name || 'summary') + '_summary.txt';
            a.click();
            URL.revokeObjectURL(url);
        }

        // 显示状态消息
        function showStatus(message, type) {
            const el = document.getElementById('status-message');
            el.textContent = message;
            el.className = `status-message ${type} active`;
        }

        function showSuccess(message) {
            showStatus(message, 'success');
            setTimeout(() => el.classList.remove('active'), 3000);
        }

        function showError(message) {
            showStatus(message, 'error');
            const el = document.getElementById('status-message');
            setTimeout(() => el.classList.remove('active'), 5000);
        }

        // HTML 转义
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 页面加载完成后初始化
        init();
    </script>
</body>
</html>
